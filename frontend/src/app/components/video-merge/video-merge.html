<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-3xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Video Merge</h1>
        <p class="text-gray-600 mt-1">
          Merge multiple videos into one output using backend V1 tooling.
        </p>
      </div>
      <div class="flex gap-2">
        <a routerLink="/" class="btn btn-secondary">Home</a>
        <a routerLink="/tool-catalog" class="btn btn-secondary">Catalog</a>
      </div>
    </div>

    <section class="card space-y-4 mb-4">
      <header>
        <h2 class="text-xl font-semibold text-gray-900">Input videos (ordered)</h2>
        <p class="mt-1 text-sm text-gray-600">Single mode only. At least 2 inputs required.</p>
      </header>

      <div class="flex flex-wrap gap-2">
        <button type="button" class="btn btn-secondary" (click)="selectVideosFromDialog()">
          Select videos (Wails)
        </button>
        <button type="button" class="btn btn-secondary" (click)="triggerFileInput()">
          Add from browser input
        </button>
      </div>

      <input
        #fileInput
        type="file"
        accept="video/mp4,video/quicktime,video/x-matroska,video/webm,.mp4,.mov,.mkv,.webm"
        class="hidden"
        multiple
        (change)="onFileInputChange($event)"
      />

      <div class="rounded-lg border border-gray-200 bg-white p-3 text-sm space-y-3">
        <p class="text-gray-600">Selected inputs (in merge order):</p>
        <div *ngIf="selectedInputPaths.length === 0" class="font-mono text-gray-900 break-all">
          No videos selected.
        </div>

        <div *ngFor="let inputPath of selectedInputPaths; let index = index" class="rounded border border-gray-200 p-2 bg-gray-50 flex gap-2 items-start justify-between">
          <div class="min-w-0">
            <p class="text-xs text-gray-500">#{{ index + 1 }}</p>
            <p class="font-mono text-xs text-gray-900 break-all">{{ inputPath }}</p>
          </div>

          <div class="flex gap-1 shrink-0">
            <button type="button" class="btn btn-secondary" (click)="moveInputUp(index)" [disabled]="index === 0">↑</button>
            <button
              type="button"
              class="btn btn-secondary"
              (click)="moveInputDown(index)"
              [disabled]="index === selectedInputPaths.length - 1"
            >
              ↓
            </button>
            <button type="button" class="btn btn-secondary" (click)="removeInput(index)">Remove</button>
          </div>
        </div>
      </div>
    </section>

    <app-tool-execution-panel
      [title]="'Video Merge Execution'"
      [subtitle]="'Flow: validate → run → poll → cancel. Supports targetFormat mp4|webm, qualityPreset high|medium|low, mergeMode auto|copy|reencode.'"
      [form]="form"
      [fields]="panelFields"
      [currentMode]="'single'"
      [validationMessage]="validationMessage"
      [submitMessage]="submitMessage"
      [statusMessage]="statusMessage"
      [isSubmitting]="isSubmitting"
      [isPolling]="isPolling"
      [canCancel]="!!activeJobId"
      [jobResult]="jobResult"
      [runButtonText]="'Run Video Merge'"
      [submittingButtonText]="'Submitting Video Merge...'"
      (validate)="validate()"
      (run)="run()"
      (cancel)="cancel()"
    ></app-tool-execution-panel>
  </div>
</div>
