<div class="min-h-screen bg-gray-50 p-6">
  <div class="mx-auto max-w-5xl space-y-6">
    <header>
      <a routerLink="/" class="btn btn-secondary">← Back to Home</a>
      <h1 class="mt-4 text-3xl font-bold text-gray-900">Image Converter</h1>
      <p class="mt-2 text-gray-600">V1 jobs flow: validate → run → poll → cancel.</p>
    </header>

    <section class="card space-y-3">
      <h2 class="text-lg font-semibold text-gray-900">Input files</h2>
      <div class="flex flex-wrap gap-2">
        <button type="button" class="btn btn-primary" (click)="selectImageFromDialog()">
          Select image
        </button>
        <button
          type="button"
          class="btn btn-secondary"
          (click)="selectMultipleImagesFromDialog()"
        >
          Select multiple images
        </button>
        <button type="button" class="btn btn-secondary" (click)="selectOutputDirectory()">
          Select output directory
        </button>
        <button type="button" class="btn btn-secondary" (click)="clearInputs()">
          Clear inputs
        </button>
      </div>

      <!-- Gate the new FileDrop-based UI behind feature flag -->
      <ng-container *ngIf="featureFlags.uiux_overhaul_v1; else legacyDrop">
        <app-file-drop (filesSelected)="onFileDropFiles($event)" accept="image/*" aria-describedby="file-drop-help"></app-file-drop>
        <p id="file-drop-help" class="sr-only">Drop image files here or press Enter to open file selector.</p>
        <!-- thumbnails placeholder -->
        <div class="mt-3 grid grid-cols-4 gap-2" aria-live="polite">
          <ng-container *ngIf="selectedInputPaths.length > 0; else noThumbs">
            <div *ngFor="let p of selectedInputPaths" class="rounded border p-2" tabindex="0">
              <div class="h-24 w-full bg-gray-100 flex items-center justify-center text-xs text-gray-500">Thumbnail</div>
              <p class="mt-1 truncate text-xs">{{ p }}</p>
            </div>
          </ng-container>
          <ng-template #noThumbs>
            <div class="col-span-4 text-sm text-gray-500">No files yet — drop images to add them.</div>
          </ng-template>
        </div>
      </ng-container>
      <ng-template #legacyDrop>
        <app-file-drop (filesSelected)="onFileDropFiles($event)" accept="image/*"></app-file-drop>
      </ng-template>

      <ul class="max-h-56 space-y-2 overflow-auto rounded-lg border border-gray-200 bg-white p-3">
        <li
          *ngFor="let path of selectedInputPaths; let i = index"
          class="flex items-center justify-between gap-2 rounded border border-gray-100 p-2"
        >
          <span class="truncate text-xs text-gray-700">{{ path }}</span>
          <button type="button" class="btn btn-secondary" (click)="removeInput(i)">
            Remove
          </button>
        </li>
        <li *ngIf="selectedInputPaths.length === 0" class="text-sm text-gray-500">
          No input files selected.
        </li>
      </ul>
    </section>

    <app-tool-execution-panel
      [title]="'Image Convert Job V1'"
      [subtitle]="'Source: tool.image.convert'"
      [form]="form"
      [fields]="panelFields"
      [currentMode]="form.controls.jobMode.value"
      [validationMessage]="validationMessage"
      [submitMessage]="submitMessage"
      [statusMessage]="statusMessage"
      [isSubmitting]="isSubmitting"
      [isPolling]="isPolling"
      [canCancel]="!!activeJobId"
      [jobResult]="jobResult"
      [runButtonText]="'Run convert job'"
      [submittingButtonText]="'Submitting image job...'"
      (validate)="validate()"
      (run)="run()"
      (cancel)="cancel()"
    ></app-tool-execution-panel>
  </div>
</div>
