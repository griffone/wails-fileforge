<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-3xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">PDF Split</h1>
        <p class="text-gray-600 mt-1">
          Split one PDF by every page or explicit page ranges.
        </p>
      </div>
      <div class="flex gap-2">
        <a routerLink="/" class="btn btn-secondary">Home</a>
        <a routerLink="/tool-catalog" class="btn btn-secondary">Catalog</a>
      </div>
    </div>

    <section class="card space-y-4 mb-4">
      <header>
        <h2 class="text-xl font-semibold text-gray-900">Input PDF</h2>
        <p class="mt-1 text-sm text-gray-600">
          Choose single or batch mode and provide one or multiple input PDFs.
        </p>
      </header>

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700" for="jobMode">
          Job mode
        </label>
        <select
          id="jobMode"
          class="w-full rounded-lg border border-gray-300 px-3 py-2"
          [formControl]="form.controls.jobMode"
        >
          <option *ngFor="let mode of jobModes" [value]="mode.value">{{ mode.label }}</option>
        </select>
      </div>

      <div class="flex flex-wrap gap-2">
        <button type="button" class="btn btn-secondary" (click)="selectPdfFromDialog()">
          Select single PDF (Wails)
        </button>
        <button type="button" class="btn btn-secondary" (click)="selectMultiplePdfsFromDialog()">
          Select multiple PDFs (Wails)
        </button>
        <button type="button" class="btn btn-secondary" (click)="triggerFileInput()">
          Add from browser input
        </button>
        <button type="button" class="btn btn-secondary" (click)="selectOutputDirectory()">
          Select output folder
        </button>
      </div>

      <input
        #fileInput
        type="file"
        multiple
        accept=".pdf,application/pdf"
        class="hidden"
        (change)="onFileInputChange($event)"
      />

      <div class="rounded-lg border border-gray-200 bg-white p-3 text-sm">
        <p class="text-gray-600 mb-1">Selected inputs:</p>
        <ul *ngIf="selectedInputPaths.length > 0" class="space-y-2">
          <li *ngFor="let inputPath of selectedInputPaths; let i = index" class="flex items-start justify-between gap-2">
            <p class="font-mono text-gray-900 break-all text-xs">{{ inputPath }}</p>
            <button type="button" class="btn btn-secondary" (click)="removeInputPath(i)">Remove</button>
          </li>
        </ul>
        <p *ngIf="selectedInputPaths.length === 0" class="font-mono text-gray-900 break-all">No PDF selected.</p>
      </div>
    </section>

    <app-tool-execution-panel
      [title]="'PDF Split Execution'"
      [subtitle]="'Validate, run, poll and cancel using V1 contracts. Ranges example: 1-3,5,8-10.'"
      [form]="form"
      [fields]="panelFields"
      [currentMode]="form.controls.strategy.value"
      [validationMessage]="validationMessage"
      [submitMessage]="submitMessage"
      [statusMessage]="statusMessage"
      [isSubmitting]="isSubmitting"
      [isPolling]="isPolling"
      [canCancel]="!!activeJobId"
      [jobResult]="jobResult"
      [runButtonText]="'Run PDF Split'"
      [submittingButtonText]="'Submitting PDF Split...'"
      (validate)="validate()"
      (run)="run()"
      (cancel)="cancel()"
    ></app-tool-execution-panel>
  </div>
</div>
