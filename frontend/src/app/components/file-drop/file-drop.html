<div class="file-drop" role="button" [attr.aria-label]="ariaLabel" tabindex="0"
     (click)="triggerFileInput()" (keydown.enter)="triggerFileInput()"
     (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
  <input type="file" #fileInput [attr.accept]="accept" [attr.multiple]="multiple ? '' : null" hidden (change)="onFileInputChange($event)" />
  <ng-container *ngIf="!dragOver">
    <div class="file-drop-inner">
      <p class="file-drop-title">Arrastrá o hacé click para seleccionar archivos</p>
      <p class="file-drop-sub">Soportado: {{ accept || 'todos los tipos' }}</p>
    </div>
  </ng-container>
  <ng-container *ngIf="dragOver">
    <div class="file-drop-inner drag-over">
      <p class="file-drop-title">Soltá para agregar archivos</p>
    </div>
  </ng-container>
</div>
