version: "3"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  APP_NAME: "fileforge-desktop"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - /home/ivan/go/bin/wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  gate:e2-10:
    summary: Runs E2-10 local release gate (no build)
    cmds:
      - ./scripts/release/gate-e2-10-local.sh

  smoke:e2-10:
    summary: Runs E2-10 desktop smoke assistant
    cmds:
      - ./scripts/release/smoke-desktop-assist.sh

  smoke:e2-10:dry:
    summary: Prints E2-10 smoke assistant dry-run output
    cmds:
      - ./scripts/release/smoke-desktop-assist.sh --dry-run

  smoke:e3-02:video:
    summary: Runs E3-02 video smoke assistant
    cmds:
      - ./scripts/release/smoke-video-e3-02-assist.sh

  smoke:e3-02:video:dry:
    summary: Prints E3-02 video smoke assistant dry-run output
    cmds:
      - ./scripts/release/smoke-video-e3-02-assist.sh --dry-run

  smoke:e3-03:video-trim:
    summary: Runs E3-03 video trim smoke assistant
    cmds:
      - ./scripts/release/smoke-video-e3-03-trim-assist.sh

  smoke:e3-03:video-trim:dry:
    summary: Prints E3-03 video trim smoke assistant dry-run output
    cmds:
      - ./scripts/release/smoke-video-e3-03-trim-assist.sh --dry-run

  smoke:e3-04:video-trim-hardening:
    summary: Runs E3-04 video trim hardening smoke assistant
    cmds:
      - ./scripts/release/smoke-video-e3-04-trim-hardening-assist.sh

  smoke:e3-04:video-trim-hardening:dry:
    summary: Prints E3-04 video trim hardening smoke assistant dry-run output
    cmds:
      - ./scripts/release/smoke-video-e3-04-trim-hardening-assist.sh --dry-run

  gate:e3-05:video:
    summary: Runs E3-05 video release gate (no build)
    cmds:
      - ./scripts/release/gate-e3-05-video-local.sh

  smoke:e3-05:video:
    summary: Runs E3-05 interactive smoke with evidence
    cmds:
      - ./scripts/release/smoke-video-e3-05-interactive-evidence.sh

  smoke:e3-05:video:dry:
    summary: Prints E3-05 smoke interactive dry-run output
    cmds:
      - ./scripts/release/smoke-video-e3-05-interactive-evidence.sh --dry-run
